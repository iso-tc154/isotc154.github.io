bio: |-
  Kevin is a digitization expert with a diverse professional background
  encompassing information management, communication technology, and academia. He
  holds pivotal positions in shaping global standards and propelling digital
  transformation. Serving as the Associate Information Management Officer at the
  United Nations Economic Commission for Europe (UN/CEFACT), Kevin acts as the
  focal point for the methodology and technology domain. In this role, he oversees
  vital initiatives and upholds essential data standards. Moreover, Kevin is
  entrusted with maintaining the UN/LOCODE, UN/EDIFACT, UN/CCL, and UN/FLUX. His
  expertise extends beyond the UN, as he also fulfills the role of Secretary for
  the UNECE/ISO TC 154 JWG 9, contributing significantly to the harmonization of
  standards in international trade and technology. Kevin's influence resonates
  across various platforms, where he participates in the EU Special Data Project
  Group and the EU MSP (Multi-stakeholder Platform) on ICT Standardization. In
  these capacities, he promotes collaboration and coherence in ICT standards,
  ensuring seamless interoperability and enhanced efficiency in global digital
  systems.

