    Semantic Repository).
  link: /meetings/15/

# === STANDARDS — ISO 8601 ERA ===

- date: 1998-01-01
  date_precision: year
  category: standard
  title: "ISO 8601 — Date and time representations"
  description: >
    The foundational standard unifying calendar dates, ordinal dates,
    times, durations, and time intervals into a single interchange format.
    TC 154 would later split it into the multi-part
    ISO 8601-1 / ISO 8601-2 structure.

- date: 1998-03-12
  date_precision: day
  category: meeting
  title: "14th plenary meeting — Geneva"
  description: >
    Hosted at the ISO Central Secretariat, Geneva.
  link: /meetings/14/

- date: 1999-12-07
  date_precision: day
  category: meeting
  title: "16th plenary meeting — Geneva"
  description: >
    Hosted at the ISO Central Secretariat, Geneva. The committee closes
    the decade with back-to-back Geneva plenaries.
  link: /meetings/16/

# === 2000s — STRATEGIC COOPERATION ===

- date: 2000-09-20
  date_precision: day
  category: meeting
  title: "17th plenary meeting — Prague"
  description: >
    The committee resolves that all documents will be distributed
    electronically only — closing the paper era and establishing the
    all-digital working method still in use today.
  link: /meetings/17/

- date: 2000-09-20
  date_precision: day
  category: cooperation
  title: "Chair Advisory Board created"
  description: >
    JISC (JP), BSI (GB), DIN (DE) and AFNOR (FR) form a Chair Advisory
    Board to progress inter-sessional work. The board has no decision-making
    authority and acts as a steering body for the Chair.

- date: 2001-09-05
  date_precision: day
  category: meeting
  title: "18th plenary meeting — Brussels"
  description: >
    Hosted by NBN at the heart of the EU regulatory district.
  link: /meetings/18/

- date: 2002-09-06
  date_precision: day
  category: meeting
  title: "19th plenary meeting — Geneva"
  description: >
    At this meeting TC 154 resolves to migrate liaisons with the EWG and
    CDWG to the newly-formed UN/CEFACT Forum.
  link: /meetings/19/

- date: 2002-01-01
  date_precision: year
  category: standard
  title: "ISO 9735 (all parts) — UN/EDIFACT syntax"
  description: >
    The complete ISO 9735 series published in 2002 codifies the
    UN/EDIFACT application-level syntax rules in nine parts, the
    culmination of the post-1997 editing committee work.

- date: 2003-03-07
  date_precision: day
  category: meeting
  title: "20th plenary meeting — San Diego"
  description: >
    Hosted by ANSI in San Diego, California.
  link: /meetings/20/

- date: 2003-09-12
  date_precision: day
  category: meeting
  title: "21st plenary meeting — Gyeonggi-do"
  description: >
    First plenary held in the Republic of Korea, hosted by KATS
    (Mr. Y.-G. Jung) in the Seoul region. Final resolutions and action
    items circulated as document N453.
  link: /meetings/21/

- date: 2004-09-10
  date_precision: day
  category: meeting
  title: "22nd plenary meeting — McLean"
  description: >
    Hosted by LMI (Mark Crawford) in McLean, Virginia, back-to-back with
    the ISO 7372 Maintenance Agency meeting and the UN/CEFACT Forum in
    the Washington D.C. metro area.
  link: /meetings/22/

- date: 2005-09-23
  date_precision: day
  category: meeting
  title: "23rd plenary meeting — Brussels"
  description: >
    Hosted by CEN/ISSS (Alain Dechamps) in Brussels, the Friday before
    the UN/CEFACT Forum in Lyon.
  link: /meetings/23/

- date: 2006-03-22
  date_precision: day
  category: meeting
  title: "24th plenary meeting — Vancouver"
  description: >
    Hosted by the Treasury Board of Canada (Ed Buchinski) at the Westin
