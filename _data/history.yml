  link: /meetings/36/

- date: 2016-10-21
  date_precision: day
  category: structure
  title: "WG 7 — Digital Business established"
  description: >
    TC 154 creates Working Group 7, "_Business_" (later renamed "_Digital
    Business_"), and appoints Klaus-Dieter Naujok as its first convenor.
  resolution: "2016-10"
  link: /groups/wg7/

- date: 2018-10-08
  date_precision: day
  category: meeting
  title: "37th plenary meeting — Hangzhou"
  description: >
    Hosted by SAC in Hangzhou, China. 35 resolutions adopted.
  link: /meetings/37/

- date: 2018-11-18
  date_precision: day
  category: cooperation
  title: "Business Plan N1001 published"
  description: >
    The final 2018 Business Plan (document N1001) is approved by ballot
    following N993, codifying the committee's vision, three strategies,
    and three action points through the current term.
  link: /business-plan/

- date: 2019-02-01
  date_precision: month
  category: standard
  title: "ISO 8601-1 and ISO 8601-2 published"
  description: >
    The single-part ISO 8601:2004 is split into two complementary
    standards. ISO 8601-1 covers fundamental representations;
    ISO 8601-2 extends them with disambiguated intervals, recurring
    intervals, and sets.

- date: 2019-10-14
  date_precision: day
  category: meeting
  title: "38th plenary meeting — Luxembourg"
  description: >
    Hosted by ILNAS at the University of Luxembourg.
  link: /meetings/38/

# === PANDEMIC ERA ===

- date: 2020-08-04
  date_precision: day
