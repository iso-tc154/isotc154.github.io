  link: /meetings/24/

- date: 2003-01-01
  date_precision: year
  category: standard
  title: "ISO 11180 withdrawn"
  description: >
    After systematic review, the 1993 Postal addressing standard is
    withdrawn.
  resolution: "244"

# === TRANSITION — 2008 ===

- date: 2008-11-25
  date_precision: day
  category: leadership
  title: "François Vuilleumier steps down as Chair"
  description: >
    After ten years leading the committee, Vuilleumier resigns as both
    Chair and Committee Manager. The secretariat transitions from SNV
    (Switzerland) to NEN (Netherlands).
  link: /members/francois-vuilleumier/

- date: 2008-11-25
  date_precision: day
  category: leadership
  title: "Robert Schubenel becomes Chair"
  description: >
    Robert Schubenel (GS1) begins a brief tenure as Chair during the
    NEN (Netherlands) secretariat years.
  link: /members/robert-schubenel/

- date: 2008-11-26
  date_precision: day
  category: meeting
  title: "25th plenary meeting — Brussels"
  description: >
    Hosted by NBN in Brussels. The committee notes with regret the
    resignation of Mr. Vuilleumier as chair and secretary.
  link: /meetings/25/

# === STANDARDS — LATE 2000s / EARLY 2010s ===

- date: 2005-01-01
  date_precision: year
  category: standard
