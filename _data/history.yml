    legally-binding e-transactions and trusted e-communications across
    mobile, IoT, and cloud environments.
  resolution: "02-2014"
  link: /groups/wg6/

- date: 2014-03-12
  date_precision: day
  category: structure
  title: "WG 3 and WG 4 disbanded"
