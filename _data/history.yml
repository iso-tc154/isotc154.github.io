# yaml-language-server: $schema=../schemas/schema.yaml#/$defs/history_file
---
# Curated historical milestones of ISO/TC 154.
# Drawn from: plenary resolutions (1973–), member role records, standards
# publication dates, and the committee Business Plan (N1001, 2018-11-18).
#
# Each entry has:
#   date: ISO date (or just year as YYYY-01-01) — used for sorting.
#   date_precision: day | month | year — controls how the date is rendered.
#   category: founding | leadership | structure | standard | liaison | meeting |
#             cooperation | withdrawn
#   title: short headline (imperative phrase or proper noun + verb).
#   description: 1–3 sentence narrative. May contain markdown-style links in
#     the form [label](/path/) — the renderer will format them.
#   link: optional in-app URL the headline should point to (e.g. /groups/wg7/).
#   resolution: optional resolution id (e.g. "P-2024-08") the milestone tracks.
#   end_date: optional ISO date marking when a tenure/project closed.
#   tags: optional free-form list for filtering.

# === FOUNDING ===

- date: 1972-01-01
  date_precision: year
  category: founding
  title: "ISO/TC 154 established"
  description: >
    ISO Council establishes ISO/TC 154, "_Processes, data elements and
    documents in commerce, industry and administration_," to carry forward
    the EDI and trade-data work previously run under ISO/TC 154's predecessor
    remit. The SNV (Switzerland) secretariat hosts the first meetings.

# === EARLY STANDARDS ===

- date: 1973-01-01
  date_precision: year
  category: standard
  title: "ISO 2711 — Ordinal dates"
  description: >
    One of the committee's first published standards: a fixed representation
    of ordinal dates (day-of-year) for information interchange.
  link: /standards/iso-2711-1973/

- date: 1975-01-01
  date_precision: year
  category: standard
  title: "ISO 3307 — Time of day"
  description: >
    Representation of the time of day for information interchange, complementing
    ISO 2711 and ISO 2014 in the foundational date-and-time suite.

- date: 1986-01-01
  date_precision: year
  category: standard
  title: "ISO 8440 — Location of codes in trade documents"
  description: >
    Establishes where UN/EDIFACT and other trade codes are placed in paper
    and electronic trade documents. A 1999 corrigendum made the standard
    Y2K-compatible.

