- date: 2014-10-20
  date_precision: day
  category: meeting
  title: "33rd plenary meeting — Incheon"
  description: >
    Hosted by KATS in Incheon, Republic of Korea.
  link: /meetings/33/

- date: 2015-10-23
  date_precision: day
  category: meeting
  title: "34th plenary meeting — Fully virtual"
  description: >
    The committee's first fully virtual plenary, held via WebEx.
  link: /meetings/34/

- date: 2016-10-17
  date_precision: day
  category: meeting
  title: "35th plenary meeting — Berlin"
  description: >
    Hosted by DIN in Berlin — the committee's return to in-person
    plenaries after the virtual 34th, and the fourth Berlin plenary
    overall.
  link: /meetings/35/

# === STANDARDS — ISO 8601 SPLIT ===

