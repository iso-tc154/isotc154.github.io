# === SECRETARIAT ERA — SNV ===

- date: 1998-01-01
  date_precision: year
  category: leadership
  title: "François Vuilleumier becomes Chair and Committee Manager"
  description: >
    François Vuilleumier (SNV, Switzerland) begins a decade-long tenure
