  description: |
    https://www.oasis-open.org[OASIS] is a Category A liaison of ISO/TC 154 and the
    originator of the ebXML suite published as the
    link:/standards/iso-15000-1-2021[ISO 15000] series. WG 4 maintains these
    deliverables — ebXML Messaging Services (15000-1/2), Collaboration Protocol
    Profile and Agreement (15000-3), and the Core Components Technical
    Specification (15000-5) — jointly with OASIS and UN/CEFACT.

    OASIS has a broad technical agenda encompassing cybersecurity, blockchain,
    privacy, cryptography, cloud computing, IoT, urban mobility, emergency
    management, and content technologies. Many OASIS Standards (AMQP, SAML, DOC,
    DITA, KMIP, MQTT, OpenC2, OpenDocument, PKCS, STIX, TAXII, TOSCA, UBL, XLIFF)
    have gone on to be published as ISO, IEC, or ITU standards.
