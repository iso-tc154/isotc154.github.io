# Errata & Feedback Acknowledgments
#
# Recognize people who have contributed errata reports, feedback, or
# other improvements to TC 154 standards.
#
# Each entry:
#   name: (required) Person's name
#   affiliation: (optional) Organization
#   date: (required) Date of acknowledgment (YYYY-MM-DD)
#   standard: (required) ISO standard reference
#   contribution: (required) Brief description of the contribution
#   url: (optional) Link to member page or external profile

