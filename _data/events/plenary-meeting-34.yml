practical_info:
  registration_note: "NSB delegates register via their National Standards Body; IGO and NFO delegates register directly with the ISO/TC 154 Secretary before 10 September 2015."
  webex_link: "Distributed to registered participants after the registration deadline."
  background: "The CAT at its 10 June 2015 discussion concluded that, given the reduced workload, only 1½–2 days of F2F meetings were justified. Experts also indicated they preferred attending a full week of the UN/CEFACT Forum over travelling to a short TC 154 meeting. CAT therefore cancelled the WG/PT and Plenary F2F meetings (N778) and replaced them with a single virtual plenary."
