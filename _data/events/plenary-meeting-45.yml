schedule:
  - date: 2026-08-31
    time: "9:00–10:30"
    event: Plenary opening session
    description: >
      Draft agenda items 1-10: opening, welcome from host, roll call,
      Code of Ethics, adoption of agenda, appointment of resolution
      drafting committee, approval of minutes, TC 154 management report
      (CM report incl. ballot results), review of previous plenary
      resolutions and action items.
  - date: 2026-08-31
    time: "11:00–17:00"
    event: (J)WG meetings begin
    description: >
      (J)WG meetings run 31 Aug to 3 Sep. Agendas and joining links
      circulated separately by each (J)WG convener.
  - date: 2026-09-01
    time: "9:00–17:00"
    event: Working Group meetings
  - date: 2026-09-02
    time: "9:00–17:00"
    event: Working Group meetings
  - date: 2026-09-03
    time: "9:00–17:00"
    event: Working Group meetings
  - date: 2026-09-04
    time: "9:00–12:00"
    event: (J)WGs report to Plenary
    description: >
      Draft agenda items 11-18: CAG report, ISO Excellence Awards,
      PWI proposals, ISO/IEC Directives update, (J)WG reports
      (JWG1, WG2, SG1, WG5, WG6, WG7, JWG9), TC-level project report,
      reappointment of convenors, liaison reports.
  - date: 2026-09-04
    time: "14:30–17:00"
    event: Plenary closing session
    description: >
      Draft agenda items 19-24 plus approval of resolutions and
      closure: strategic issues / Business Plan, CAG ToR, communication,
      national body report, next plenary dates, any other business.

