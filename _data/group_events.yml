# Group lifecycle events curated from ISO/TC 154 plenary resolutions.
#
# Every event in this file is backed by text in a plenary resolution YAML.
# The resolution_ref field links back to the source resolution identifier
# (e.g. "003-2013" → /resolutions/003-2013) and resolution_meeting names
# the plenary (e.g. "P32") that took the decision.
#
# Succession model: when a working group is renumbered or converted between
# joint and non-joint forms, the old entity is DISSOLVED and the new entity
# is ESTABLISHED at the same effective date, with predecessor/successor
# links between them. Renames, scope changes, and convenor rotations are
# same-entity lifecycle events.
#
# Field reference:
#   group_id            group slug (matches _data/groups/{slug}.yml)
#   type                established | dissolved | convenor_appointed
#                       | convenor_extended | scope_change | succession
#                       | title_change
#   date                ISO 8601 date the action took effect
#   precision           year | month | day (how precise `date` is)
#   title               short headline shown on the timeline
#   description         optional longer narrative
#   resolution_ref      resolution identifier (links to /resolutions/<ref>)
#   resolution_meeting  plenary ordinal (P25, P28, P30, ...)
#   person_name         convenor name (convenor_appointed / convenor_extended)
#   person_member_id    member slug if known
#   term_until          ISO date the convenor term ends (convenor_appointed)
#   predecessor         group slug this entity succeeded (established/succession)
#   successor           group slug that succeeded this entity (dissolved/succession)
#
# Convenor appointments are mirrored into convenor_terms at build time from
# member role records; entries here provide resolution_ref + term_until that
# the member records do not carry.

events:

  # ---- WG 1 (Semantic engine) --------------------------------------------
  # WG 1 predates the plenary resolutions we hold (P10+). It was active
  # from the early 1990s. P19 R159 changed its name to "Semantic engine".
  - group_id: wg1
    type: title_change
    date: 2002-09-06
    precision: day
    title: Renamed to "Semantic engine"
    description: |
      WG 1 requested a name change to "Semantic engine" to provide better
      visibility on its work as a central reference for universal,
      multilingual understanding of data across commerce, industry and
      administration.
    resolution_ref: '159'
    resolution_meeting: P19

  - group_id: wg1
    type: dissolved
    date: 2008-11-25
    precision: day
    title: Disbanded
    description: |
      No active work items remained allocated to WG 1 (Semantic engine).
    resolution_ref: '277'
    resolution_meeting: P25

  # ---- JWG 2 → JWG 4 → WG 4 lineage --------------------------------------
  # P28 R305 (effective 2009-09-25): renumber JWG on eLK from 2 to 4.
  # The succession model treats this as: JWG 2 dissolved, JWG 4 established.
  - group_id: jwg2
    type: dissolved
    date: 2009-09-25
    precision: day
    title: Renumbered as JWG 4
    description: |
      The joint working group on the electronic Layout Key was renumbered
      from JWG 2 to JWG 4.
    resolution_ref: '305'
    resolution_meeting: P28
    successor: jwg4

  - group_id: jwg4
    type: established
    date: 2009-09-25
    precision: day
    title: Renumbered from JWG 2
    description: |
      Established by renumbering the former JWG 2 on the electronic Layout
      Key.
    resolution_ref: '305'
    resolution_meeting: P28
    predecessor: jwg2

