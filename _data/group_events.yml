# Curated overrides for groups whose lifecycle is partially documented
# outside resolutions (mostly establishment dates not captured in any
# plenary resolution we hold).
overrides:

  # WG 3 was established upon the former CCTS ad-hoc group of ISO/TC 154
  # in March 2006 (per current wg3.yml intro).
  - group_id: wg3
    field: established
    date: 2006-03-01
    precision: month
    title: Established from CCTS ad-hoc group
    description: |
      WG 3 was established upon the former CCTS ad-hoc group of
      ISO/TC 154 in March 2006, to maintain ISO/TS 15000-5 (Core
      Components Technical Specification) in liaison with UN/CEFACT.

  # JWG 1 was established in the late 1980s as the Joint Syntax Working
  # Group (JSWG) with UNECE. No establishment resolution exists in our
  # records (we hold P10+; JWG 1 already existed).
  - group_id: jwg1
    field: established
    date: 1988-01-01
    precision: year
    title: Established as Joint Syntax Working Group
    description: |
      JWG 1 was established in the late 1980s as the Joint Syntax
      Working Group (JSWG) with the UNECE to develop and maintain the
      EDIFACT syntax (ISO 9735). The first syntax version was published
      in 1988.

  # WG 1 predates the plenary resolutions we hold. It was active from the
  # early days of TC 154 and was renamed to "Semantic engine" at P19.
  - group_id: wg1
    field: established
    date: 1992-01-01
    precision: year
    title: Established
    description: |
      WG 1 was established in the early 1990s as a working group of
      ISO/TC 154. Its objective was to act as a central reference to
      assist in the universal, multilingual understanding of data across
      commerce, industry and administration.

  # The current WG 2 (Supply chain) is a re-establishment after P30 R312.
  # The exact re-establishment resolution is not in the resolutions we
  # hold. We record only that the current WG 2 is active.
  - group_id: wg2
    field: note
    date: 2020-01-01
    precision: year
    title: Re-established
    description: |
      The current WG 2 (Supply chain data) is a re-establishment of the
      committee after P30 R312 dissolved the prior incarnation that had
      completed ISO/TS 17369.

  # CAG was dissolved at P30 R319 and is currently active; its
  # re-establishment is not captured in the plenary resolutions we hold.
  - group_id: cag
    field: note
    date: 2017-01-01
    precision: year
    title: Re-established
    description: |
      The CAG was re-established at some point between P30 (2011) and
      P38 (2018). By P39 (2020) it was active under convenor Hongru
      (Judy) Zhu, who also served as ISO/TC 154 Chair from 2017 to 2021.
