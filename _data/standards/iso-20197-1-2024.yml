  scope: |-
    The scope and limitations of the business processes described in this document have been developed to enable the application of the Buy-Ship-Pay business standard for implementations of national, regional, trade sector or modal specific cross-border scenarios.
    NOTE           Only the high-level process descriptions are referenced in this document in order that the detailed process analysis of the subset scenarios can provide the detailed process requirements in further individual Business Requirements Specifications (BRSs).
