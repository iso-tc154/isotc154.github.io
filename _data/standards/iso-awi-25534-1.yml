  scope: This document provides the overview and fundamental principles for Digital Product Passports (DPP). It establishes common terminology, outlines core principles for DPP standardization, defines data categories, and describes governance and trust mechanisms. It also provides guidance on the relationship with existing standards and approaches to ensuring global consistency and regulatory compliance. This document is intended to provide a foundational and harmonized approach for all stakeholders involved in the development, implementation, and use of Digital Product Passports across different industries and regions.
