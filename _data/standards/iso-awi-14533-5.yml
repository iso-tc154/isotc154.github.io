iso:
  name: ISO/AWI 14533-5
  type: international
  title: 'Processes, data elements and documents in commerce, industry and administration — Long term signature — Part 5: profiles for JSON Advanced Electronic Signatures (JAdES)'
  stage: '20.0'
  ics: 35.240.63
  scope: |-
    This part of ISO 14533 specifies the elements, among those defined in JAdES digital signatures, that enable verification of JSON digital signatures over a long period of time.
    It does not give new technical specifications about the digital signature itself, nor gives new restrictions of usage of the technical specifications about the digital signatures which already existed.
