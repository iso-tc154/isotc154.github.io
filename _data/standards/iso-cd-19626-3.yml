  title: 'Processes, data elements and documents in commerce, industry and administration — Trusted communication platform for electronic documents — Part 3: Blockchain-based implementation guideline'
  stage: '30.60'
  scope: "This proposed document provides implementation guidelines for applying blockchain technology effectively on the TCP system that conforms to ISO 19626-1 and 19626-2 standards. At first, it reviews technical considerations that impact on TCP system according to adopting blockchain technology. Based on these considerations, the overall architecture of blockchain-based TCP is recommended. \nFor system developers, this document provides specific implementation guides by TCP components and each implementation details such as the process and the block-data structure.  For a variety of usage of blockchain-based TCP systems, several configuration models of the TCP DLT system are illustrated."
