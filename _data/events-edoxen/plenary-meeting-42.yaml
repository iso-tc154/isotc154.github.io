# yaml-language-server: $schema=../schemas/edoxen-meeting.yaml
#
# ISO/TC 154 42nd plenary meeting week — converted to the canonical
# Edoxen Meeting model. Field semantics are preserved; structure is
# flattened through `localizations[]` and routed through the official
# Location/Person/HostRef/ScheduleItem types.
#
# This file coexists with the legacy _data/events/plenary-meeting-42.yml
# during migration. The legacy shape is still consumed by the older
# meetings.mjs code path; edoxen-shape is detected by the presence of
# `identifier: [{...}]` at the top of the file.
identifier:
  - prefix: "ISO/TC 154"
    number: "42"
urn: urn:iso-tc154:meeting:plenary-42
type: plenary
status: completed
year: 2023
ordinal: 42
landing_url: /events/plenary-meeting-42/

date_range:
  start: 2023-10-24
  end: 2023-10-27

committee: "ISO/TC 154"

general_area: "Hong Kong, China"
country_code: HK

venues:
  - name: Fairmont House (HKMA)
    address: |
      14/F, Fairmont House, 8 Cotton Tree Drive
      Central, Hong Kong, China
    link: https://www.hkma.org.hk/room_rental/central-admiralty.asp

host: CALCONNECT / ITCHKSAR
hosts:
  - ref: calconnect
    type: liaison
    role: co-host
  - ref: itchksar
    type: national-body
    role: host

secretary:
  name: Jianfang Zhang
  organization: SAC (CNIS)
  email: zhangjf@cnis.gov.cn
  phone: "+86-10-58811613"

schedule:
  - date: 2023-10-24
    time: "9:00–10:30"
    event: Plenary opening
    description: Review of ISO/TC 154 work since last plenary meeting
  - date: 2023-10-24
    time: "11:00–12:30"
    event: JWG1 meeting
    description: Discussion of ISO 9735 Implementation Guide
  - date: 2023-10-24
    time: "14:30–16:00"
    event: WG6 meeting
    description: Discussion of ISO/AWI TR 19626-3, ISO 14533-3
  - date: 2023-10-25
    time: "9:00–10:30"
    event: WG5 meeting
    description: Discussion of ISO 8601-2:2019/CD Amd 1
  - date: 2023-10-25
    time: "11:00–12:00"
    event: Ad-hoc group meeting
    description: Review of report; discussion of necessity to establish JWG with TC 307. ISO/PWI 36100, ISO/PWI 36200 if possible.
  - date: 2023-10-25
    time: "14:00–17:30"
    event: TC-level projects / new JWG
    description: Discussion of ISO 7372 (UNTDED), ISO/DIS 20197-1, ISO/FDIS 23355, ISO/WD 5909, ISO/PWI 16356
  - date: 2023-10-26
    time: "9:00–17:00"
    event: WG7 meeting
    description: Other parts of ISO 5054, other parts of ISO 15000, ISO/PWI 16320-1, ISO/PWI 20195, ISO/PWI 20191, ISO/PWI 20180, ISO/PWI TR 20194
  - date: 2023-10-27
    time: "9:00–12:00"
    event: WGs report to Plenary
    description: WG report and WG recommendation to plenary
  - date: 2023-10-27
    time: "14:30–16:30"
    event: Plenary closing
    description: Discussion of plenary resolution and other business

deadlines:
  - date: 2023-09-30
    description: Registration via ISO meeting platform
  - date: 2023-09-30
    description: Liaison and national body report submissions

localizations:
  - language_code: eng
    script: Latn
    title: "42nd plenary meeting week"
    general_area: "Hong Kong, China"
    practical_info: |
      Accommodation options near the venue are listed separately on
      the meeting landing page. Several hotels in the Central and
      Wanchai districts were recommended by the host.
