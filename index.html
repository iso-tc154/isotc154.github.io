<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="application-name" content="ISO/TC 154" />
    <meta name="apple-mobile-web-app-title" content="ISO/TC 154" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>ISO/TC 154 — Processes, data elements and documents in commerce, industry and administration</title>
    <meta name="description" content="ISO/TC 154 develops international standards for processes, data elements and documents used in commerce, industry and administration — including ISO 8601, EDIFACT, ISO 7372, and ISO 14533." />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/entry.ts"></script>
  </body>
</html>
